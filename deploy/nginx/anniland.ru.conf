server {
    listen 80;
    server_name anniland.ru www.anniland.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://anniland.ru$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name anniland.ru www.anniland.ru;

    ssl_certificate /etc/letsencrypt/live/anniland.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/anniland.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;

    location /static/ {
        alias /opt/anniland/Bot_Mont_SHK/web/static/;
        access_log off;
        expires 1h;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }
}
