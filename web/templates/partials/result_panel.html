{% if result %}
<section class="panel-card border {% if result.level == 'error' %}border-rose-400/30{% elif result.level == 'warning' %}border-amber-400/30{% else %}border-emerald-400/30{% endif %}">
    <div class="panel-label">Result</div>
    <h2 class="mt-3 text-2xl font-semibold text-white">{{ result.title }}</h2>
    <div class="mt-4 whitespace-pre-line leading-7 text-slate-200">{{ result.message }}</div>
    {% if result.sheet_url %}
    <div class="mt-4">
        <a class="text-fuchsia-200 transition hover:text-white" href="{{ result.sheet_url }}">Ссылка на таблицу</a>
    </div>
    {% endif %}
</section>
{% else %}
<section class="panel-card">
    <div class="panel-label">Live result</div>
    <h2 class="mt-3 text-2xl font-semibold text-white">Результат обработки появится здесь</h2>
    <p class="mt-4 text-sm leading-7 text-slate-300">
        Используйте формы слева: результат подгрузится без полной перезагрузки страницы через HTMX.
    </p>
</section>
{% endif %}
