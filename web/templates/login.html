{% extends "base.html" %}

{% block title %}Вход | AnniLand{% endblock %}

{% block content %}
<section class="mx-auto flex min-h-[calc(100vh-88px)] max-w-7xl items-center px-6 py-16">
    <div class="grid w-full gap-10 lg:grid-cols-[0.9fr_1.1fr] lg:items-center">
        <div>
            <div class="text-sm uppercase tracking-[0.35em] text-fuchsia-200/80">Secure access</div>
            <h1 class="mt-4 text-4xl font-bold tracking-tight text-white">Вход в рабочую зону бота</h1>
            <p class="mt-4 max-w-xl text-lg leading-8 text-slate-300">
                Защищённый вход нужен, чтобы файлы, таблицы, Я.Диск и админский контур не были доступны публично.
            </p>
        </div>
        <div class="mx-auto w-full max-w-md rounded-[2rem] border border-white/10 bg-white/5 p-8 shadow-2xl shadow-slate-950/50 backdrop-blur">
            <form method="post" action="/login" class="space-y-5">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <div>
                    <label class="mb-2 block text-sm text-slate-300" for="username">Логин</label>
                    <input class="form-input" id="username" name="username" type="text" autocomplete="username" required>
                </div>
                <div>
                    <label class="mb-2 block text-sm text-slate-300" for="password">Пароль</label>
                    <input class="form-input" id="password" name="password" type="password" autocomplete="current-password" required>
                </div>
                {% if auth_error %}
                <div class="rounded-2xl border border-rose-400/30 bg-rose-500/10 px-4 py-3 text-sm text-rose-100">{{ auth_error }}</div>
                {% endif %}
                <button class="w-full rounded-full bg-white px-5 py-3 font-semibold text-slate-950 transition hover:bg-fuchsia-100" type="submit">
                    Войти в workspace
                </button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
